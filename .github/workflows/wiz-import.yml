name: Wiz Project Import
run-name: Wiz Project import into PD by @${{ github.actor }}

permissions:
  contents: read
  actions: write
  id-token: write

on:
  workflow_dispatch:
    inputs:
      project_uuid:
        description: "Wiz Project UUID to import"
        required: true
        default: "b044c7e1-bae8-5365-aa29-42a1a193dc1f"

jobs:
  import:
    runs-on: ubuntu-latest
    environment: PD
    timeout-minutes: 30
    env:
      TF_DIR: wiz-projects/environments/PD
      WIZ_CLIENT_ID: ${{ secrets.WIZ_CLIENT_ID }}
      WIZ_CLIENT_SECRET: ${{ secrets.WIZ_CLIENT_SECRET }}
      PROJECT_UUID: ${{ inputs.project_uuid }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Secrets
        run: |
          echo "[INFO]: Validating required secrets for environment 'PD'..."
          [ -n "$WIZ_CLIENT_ID" ] && [ -n "$WIZ_CLIENT_SECRET" ] || {
            echo "[ERROR]: Missing secrets for environment 'PD' - check WIZ_CLIENT_ID / WIZ_CLIENT_SECRET repo secrets"
            exit 1
          }
          echo "[INFO]: All secrets validated ✓"

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4.1.0
        with:
          role-to-assume: arn:aws:iam::018139544949:role/admin/gw-accountautomation-role
          aws-region: us-east-1
          role-session-name: WIZ-PROJECT-IMPORT-PD-${{ github.run_number }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3.1.1
        with:
          terraform_version: 1.6.6
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: |
          echo "[INFO]: Initializing Terraform..."
          terraform init -no-color
          echo "[INFO]: Terraform initialization completed"

      - name: Terraform Import
        working-directory: ${{ env.TF_DIR }}
        run: |
          terraform import \
            -var-file="tfvars/PD.tfvars.example" \
            wiz_project.this \
            "$PROJECT_UUID"

      - name: Export state as JSON
        working-directory: ${{ env.TF_DIR }}
        run: terraform show -json > imported_state.json

      - name: Upload imported state artifact
        uses: actions/upload-artifact@v4
        with:
          name: wiz-imported-state-PD
          path: ${{ env.TF_DIR }}/imported_state.json
