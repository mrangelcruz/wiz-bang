name: Wiz Project Import

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to import into"
        required: true
        default: pd
        type: choice
        options: [dv, pd]
      project_uuid:
        description: "Wiz Project UUID to import"
        required: true
        default: "b044c7e1-bae8-5365-aa29-42a1a193dc1f"

jobs:
  import:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3.1.1
        with:
          terraform_version: 1.6.6
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: wiz-projects/environments/${{ inputs.environment }}
        env:
          WIZ_CLIENT_ID: ${{ secrets.WIZ_CLIENT_ID }}
          WIZ_CLIENT_SECRET: ${{ secrets.WIZ_CLIENT_SECRET }}
        run: terraform init -upgrade

      - name: Terraform Import
        working-directory: wiz-projects/environments/${{ inputs.environment }}
        env:
          WIZ_CLIENT_ID: ${{ secrets.WIZ_CLIENT_ID }}
          WIZ_CLIENT_SECRET: ${{ secrets.WIZ_CLIENT_SECRET }}
        run: |
          terraform import \
            -var-file="tfvars/${{ inputs.environment }}.tfvars.example" \
            wiz_project.this \
            ${{ inputs.project_uuid }}

      - name: Export state as JSON
        working-directory: wiz-projects/environments/${{ inputs.environment }}
        run: terraform show -json > imported_state.json

      - name: Upload imported state artifact
        uses: actions/upload-artifact@v4
        with:
          name: wiz-imported-state-${{ inputs.environment }}
          path: wiz-projects/environments/${{ inputs.environment }}/imported_state.json
