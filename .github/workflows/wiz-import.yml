name: Wiz Project Import
run-name: Wiz GraphQL Introspection by @${{ github.actor }}

permissions:
  contents: read
  actions: write

on:
  workflow_dispatch:
    inputs:
      project_uuid:
        description: "Unused (kept to preserve UI compatibility)"
        required: false
        default: "n/a"

jobs:
  import:
    runs-on: ubuntu-latest
    environment: PD
    timeout-minutes: 30
    env:
      WIZ_CLIENT_ID: ${{ secrets.WIZ_CLIENT_ID }}
      WIZ_CLIENT_SECRET: ${{ secrets.WIZ_CLIENT_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Secrets
        run: |
          [ -n "$WIZ_CLIENT_ID" ] && [ -n "$WIZ_CLIENT_SECRET" ] || {
            echo "[ERROR]: Missing WIZ_CLIENT_ID / WIZ_CLIENT_SECRET"
            exit 1
          }
          echo "[INFO]: Secrets validated ✓"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: provider/go.mod
          cache-dependency-path: provider/go.sum

      - name: Test Wiz Auth Connectivity
        run: |
          echo "=== DNS lookup ==="
          nslookup auth.app.wiz.io || true
          echo "=== TCP connect ==="
          curl -v --max-time 10 https://auth.app.wiz.io/oauth/token 2>&1 || true

      - name: Run Introspection
        working-directory: provider
        run: |
          go run ./tools/introspect \
            --api-url  https://api.us9.app.wiz.io/graphql \
            --out-dir  ./tools/introspect/out

      - name: Upload Introspection Artifact
        uses: actions/upload-artifact@v4
        with:
          name: wiz-introspection
          path: provider/tools/introspect/out/
