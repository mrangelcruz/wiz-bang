name: Wiz GraphQL Introspection

on:
  workflow_dispatch:
    inputs:
      wiz_api_url:
        description: "Wiz GraphQL URL (from Wiz Profile > Tenant Info)"
        required: true
        default: "https://api.us9.app.wiz.io/graphql"

env:
  GO_VERSION: "1.22"
  GOPROXY: https://artifactory-pd-infra.aks.aze1.cloud.geico.net/artifactory/api/go/mvp-billing-golang-all
  GONOSUMDB: github.com/geico-private,dev.azure.com

jobs:
  introspect:
    name: Introspect Wiz GraphQL Schema
    runs-on:
      group: "k8s-default-runner"
    defaults:
      run:
        working-directory: provider

    env:
      WIZ_API_URL: ${{ inputs.wiz_api_url }}
      WIZ_CLIENT_ID: ${{ secrets.WIZ_CLIENT_ID }}
      WIZ_CLIENT_SECRET: ${{ secrets.WIZ_CLIENT_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Wiz credentials
        run: |
          [ -n "$WIZ_CLIENT_ID" ] && [ -n "$WIZ_CLIENT_SECRET" ] || {
            echo "[ERROR] WIZ_CLIENT_ID or WIZ_CLIENT_SECRET secret is missing"
            exit 1
          }
          echo "[INFO] Wiz credentials present (masked)"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download dependencies (multi-proxy fallback)
        run: |
          export GONOSUMDB='github.com/geico-private,dev.azure.com'

          export GOPROXY='https://artifactory-pd-infra.aks.aze1.cloud.geico.net/artifactory/api/go/mvp-billing-golang-all'
          go mod download || echo "[WARN] Attempt 1 incomplete"

          export GOPROXY='https://artifactory-pd-infra.aks.aze1.cloud.geico.net/artifactory/api/go/core-golang-all'
          go mod download || echo "[WARN] Attempt 2 incomplete"

          export GOPROXY='direct'
          go mod download || echo "[WARN] Attempt 3 incomplete"

          export GOPROXY='https://artifactory-pd-infra.aks.aze1.cloud.geico.net/artifactory/api/go/mvp-billing-golang-all'
          go mod download
          echo "[INFO] Dependencies resolved"

      - name: Build introspection tool
        run: |
          go build -o introspect ./tools/introspect/
          echo "[INFO] Introspect tool built"

      - name: Run introspection
        run: |
          ./introspect \
            --api-url "$WIZ_API_URL" \
            --out-dir ./tools/introspect/out

      - name: List output files
        if: always()
        run: |
          echo "[INFO] Introspection output:"
          find ./tools/introspect/out -type f | sort || echo "No files produced"

      - name: Ensure artifact directory is non-empty
        if: always()
        run: |
          mkdir -p ./tools/introspect/out
          test -n "$(ls -A ./tools/introspect/out 2>/dev/null)" || \
            echo "no files produced" > ./tools/introspect/out/_empty.txt

      - name: Upload introspection artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wiz-introspection
          path: provider/tools/introspect/out/**
          retention-days: 30
