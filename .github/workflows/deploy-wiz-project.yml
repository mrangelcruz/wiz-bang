name: "deploy-wiz-project"
run-name: Wiz Project `terraform ${{ github.event.inputs.action }} in PD` by @${{ github.actor }}

permissions:
  contents: read
  id-token: write

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Select Terraform action to perform'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
      confirm_critical_op:
        description: "Type action name to confirm (apply only)"
        required: false
        type: string

  push:
    branches: [main, wiz-test-project, feature/wiz-test-project]
    paths:
      - "wiz-projects/**"
      - ".github/workflows/deploy-wiz-project.yml"

env:
  TF_DIR: wiz-projects/environments/PD

concurrency:
  group: wiz-project-PD
  cancel-in-progress: false

jobs:
  wiz-project-terraform:
    runs-on: ubuntu-latest
    environment: PD
    timeout-minutes: 30
    env:
      WIZ_CLIENT_ID: ${{ secrets.WIZ_CLIENT_ID }}
      WIZ_CLIENT_SECRET: ${{ secrets.WIZ_CLIENT_SECRET }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Secrets
        run: |
          echo "[INFO]: Validating required secrets for environment 'PD'..."
          [ -n "$WIZ_CLIENT_ID" ] && [ -n "$WIZ_CLIENT_SECRET" ] || {
            echo "[ERROR]: Missing secrets for environment 'PD' - check WIZ_CLIENT_ID / WIZ_CLIENT_SECRET repo secrets"
            exit 1
          }
          echo "[INFO]: All secrets validated ✓"

      - name: Validate Apply Confirmation
        if: github.event.inputs.action == 'apply'
        run: |
          if [ "${{ github.event.inputs.confirm_critical_op }}" != "apply" ]; then
            echo "[ERROR]: You must type 'apply' to proceed with the terraform apply operation"
            exit 1
          fi
          echo "[INFO]: Validated user confirmation for Apply operation"

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4.1.0
        with:
          role-to-assume: arn:aws:iam::018139544949:role/admin/gw-accountautomation-role
          aws-region: us-east-1
          role-session-name: WIZ-PROJECT-PD-${{ github.run_number }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3.1.1
        with:
          terraform_version: 1.6.6

      - name: Terraform Format Check
        working-directory: ${{ env.TF_DIR }}
        run: |
          if ! terraform fmt -check; then
            echo "[ERROR]: Terraform files are not properly formatted"
            echo "[INFO]: Run 'terraform fmt' to fix formatting"
            exit 1
          fi
          echo "[INFO]: Format check passed"

      - name: Terraform Init
        working-directory: ${{ env.TF_DIR }}
        run: |
          echo "[INFO]: Initializing Terraform..."
          terraform init -no-color
          echo "[INFO]: Terraform initialization completed"

      - name: Terraform Validate
        working-directory: ${{ env.TF_DIR }}
        run: |
          echo "[INFO]: Validating Terraform configuration..."
          terraform validate -no-color
          echo "[INFO]: Terraform validation passed"

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.TF_DIR }}
        run: |
          echo "[INFO]: Creating Terraform plan..."
          terraform plan -no-color -detailed-exitcode \
            -var-file="tfvars/PD.tfvars.example" \
            -out=tfplan
          echo "[INFO]: Terraform plan created"

      - name: Plan Summary
        run: |
          echo "[INFO]: Plan outcome: ${{ steps.plan.outcome }}"
          echo "[INFO]: Plan exit code: ${{ steps.plan.outputs.exitcode }}"

          if [ "${{ steps.plan.outputs.exitcode }}" == "0" ]; then
            echo "[INFO]: No changes required - infrastructure is up-to-date"
          elif [ "${{ steps.plan.outputs.exitcode }}" == "2" ]; then
            echo "[INFO]: Changes detected - ready for deployment"
          else
            echo "[ERROR]: Plan failed - check configuration (exit code: ${{ steps.plan.outputs.exitcode }})"
            exit 1
          fi

      - name: Terraform Apply
        if: github.event.inputs.action == 'apply' && steps.plan.outputs.exitcode == '2'
        working-directory: ${{ env.TF_DIR }}
        run: |
          echo "[INFO]: Applying Terraform changes..."
          terraform apply -auto-approve -no-color tfplan
          echo "[INFO]: Terraform apply completed successfully"
