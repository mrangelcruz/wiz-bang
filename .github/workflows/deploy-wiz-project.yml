name: Deploy Wiz Project (Terraform)

on:
  workflow_dispatch:
    inputs:
      env:
        description: "Environment to deploy"
        required: true
        default: dv
        type: choice
        options: [dv, pd]

  push:
    branches: [feature/wiz-test-project]
    paths:
      - "wiz-projects/**"
      - ".github/workflows/deploy-wiz-project.yml"

  pull_request:
    paths:
      - "wiz-projects/**"
      - ".github/workflows/deploy-wiz-project.yml"

jobs:
  plan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3.1.1
        with:
          terraform_version: 1.6.6

      - name: Terraform Init
        working-directory: wiz-projects/environments/${{ github.event_name == 'workflow_dispatch' && inputs.env || 'dv' }}
        env:
          WIZ_CLIENT_ID: ${{ (github.event_name == 'workflow_dispatch' && inputs.env == 'pd') && secrets.WIZ_CLIENT_ID_PD || secrets.WIZ_CLIENT_ID_DV }}
          WIZ_CLIENT_SECRET: ${{ (github.event_name == 'workflow_dispatch' && inputs.env == 'pd') && secrets.WIZ_CLIENT_SECRET_PD || secrets.WIZ_CLIENT_SECRET_DV }}
        run: terraform init -upgrade

      - name: Terraform Format Check
        working-directory: wiz-projects/environments/${{ github.event_name == 'workflow_dispatch' && inputs.env || 'dv' }}
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        working-directory: wiz-projects/environments/${{ github.event_name == 'workflow_dispatch' && inputs.env || 'dv' }}
        run: terraform validate

      - name: Terraform Plan
        working-directory: wiz-projects/environments/${{ github.event_name == 'workflow_dispatch' && inputs.env || 'dv' }}
        env:
          WIZ_CLIENT_ID: ${{ (github.event_name == 'workflow_dispatch' && inputs.env == 'pd') && secrets.WIZ_CLIENT_ID_PD || secrets.WIZ_CLIENT_ID_DV }}
          WIZ_CLIENT_SECRET: ${{ (github.event_name == 'workflow_dispatch' && inputs.env == 'pd') && secrets.WIZ_CLIENT_SECRET_PD || secrets.WIZ_CLIENT_SECRET_DV }}
          TF_ENV: ${{ github.event_name == 'workflow_dispatch' && inputs.env || 'dv' }}
        run: |
          terraform plan -var-file="tfvars/${TF_ENV}.tfvars.example" -out=tfplan

      - name: Upload plan artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ inputs.env }}
          path: wiz-projects/environments/${{ inputs.env }}/tfplan

  apply:
    if: github.event_name == 'workflow_dispatch'
    needs: [plan]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3.1.1
        with:
          terraform_version: 1.6.6

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ inputs.env }}
          path: wiz-projects/environments/${{ inputs.env }}

      - name: Terraform Init
        working-directory: wiz-projects/environments/${{ inputs.env }}
        env:
          WIZ_CLIENT_ID: ${{ inputs.env == 'pd' && secrets.WIZ_CLIENT_ID_PD || secrets.WIZ_CLIENT_ID_DV }}
          WIZ_CLIENT_SECRET: ${{ inputs.env == 'pd' && secrets.WIZ_CLIENT_SECRET_PD || secrets.WIZ_CLIENT_SECRET_DV }}
        run: terraform init

      - name: Terraform Apply
        working-directory: wiz-projects/environments/${{ inputs.env }}
        env:
          WIZ_CLIENT_ID: ${{ inputs.env == 'pd' && secrets.WIZ_CLIENT_ID_PD || secrets.WIZ_CLIENT_ID_DV }}
          WIZ_CLIENT_SECRET: ${{ inputs.env == 'pd' && secrets.WIZ_CLIENT_SECRET_PD || secrets.WIZ_CLIENT_SECRET_DV }}
        run: terraform apply -auto-approve tfplan
